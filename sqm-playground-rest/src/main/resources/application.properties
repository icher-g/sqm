spring.application.name=sqm-playground-rest
sqm.playground.rest.abuse.rate-limit-enabled=${SQM_PLAYGROUND_RATE_LIMIT_ENABLED:true}
sqm.playground.rest.abuse.requests-per-window=${SQM_PLAYGROUND_REQUESTS_PER_WINDOW:20}
sqm.playground.rest.abuse.window-seconds=${SQM_PLAYGROUND_WINDOW_SECONDS:60}
sqm.playground.rest.abuse.max-request-bytes=${SQM_PLAYGROUND_MAX_REQUEST_BYTES:16384}
sqm.playground.rest.abuse.trust-proxy-headers=${SQM_PLAYGROUND_TRUST_PROXY_HEADERS:false}
sqm.playground.rest.abuse.client-ip-header=${SQM_PLAYGROUND_CLIENT_IP_HEADER:X-Forwarded-For}
sqm.playground.rest.cors.allowed-origins=${SQM_PLAYGROUND_ALLOWED_ORIGINS:http://localhost:5173}
