name: Publish playground image

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE != '' && vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Docker Hub configuration
        run: |
          if [ -z "${DOCKERHUB_NAMESPACE}" ]; then
            echo "DOCKERHUB_NAMESPACE repository variable or DOCKERHUB_USERNAME secret must be configured."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/sqm-playground
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push playground image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/playground/Dockerfile
          build-args: |
            VITE_PLAYGROUND_API_BASE_URL=/sqm/playground/api/v1
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
